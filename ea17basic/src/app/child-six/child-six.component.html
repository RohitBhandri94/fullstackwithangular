<h6>This is example6</h6>

<div class="container">
    <div class="row mt-5">
        <div class="col-sm-8 offset-sm-2">
            <table class="table table-bordered  ">
                <thead>
                    <th>Roll No.</th>
                    <th>First Name</th>
                    <th>Last Name</th>
                    <th>Email</th>
                    <th>Contact</th>
                </thead>
                <tbody *ngFor ="let std of studentInfoArray; let i =index ">
                    <tr>
                        <td>{{i+1}}</td>
                        <td>{{std.firstName}}</td>
                        <td>{{std.lastName}}</td>
                        <td>{{std.email}}</td>
                        <td>{{std.contact}}</td>

                      </tr>
                </tbody>
            </table>

        </div>

    </div>
</div>
